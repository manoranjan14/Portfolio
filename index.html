  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ext-decoration: none;\">LinkedIn<\u002Fa>\n      <a href=\"tel:+919892600158\" style=\"padding: 15px 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); color: #F2F4FA; font-size: 14px; font-weight: 600; text-decoration: none;\" style-hover=\"border-color: #C6F24E; color: #C6F24E; text-decoration: none;\">+91 98926 00158<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROJECT MODAL ============ -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Project Modal\" onclick=\"{{ closeModal }}\" style=\"position: fixed; inset: 0; z-index: 100; background: rgba(4,5,9,0.78); backdrop-filter: blur(10px); display: flex; align-items: flex-start; justify-content: center; padding: clamp(10px, 3vw, 32px); animation: modal-fade 0.25s ease; overflow-y: auto; -webkit-overflow-scrolling: touch;\">\n      <div onclick=\"{{ stopClick }}\" style=\"position: relative; margin: auto; width: min(720px, 100%); box-sizing: border-box; background: #0D0F17; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: clamp(18px, 4vw, 36px); padding-top: clamp(56px, 9vw, 64px); animation: modal-pop 0.35s cubic-bezier(0.2,0.9,0.3,1);\">\n        <button onclick=\"{{ closeModal }}\" aria-label=\"Close\" style=\"position: absolute; top: 18px; right: 18px; width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: #C8CBD9; font-size: 16px; cursor: pointer; display: grid; place-items: center;\" style-hover=\"border-color: #C6F24E; color: #C6F24E;\">✕<\u002Fbutton>\n\n        <span style=\"display: inline-block; border: 1px solid {{ active.accent }}; color: {{ active.accent }}; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 999px; margin-bottom: 14px;\">{{ active.lang }}<\u002Fspan>\n        <h3 style=\"font-family: 'Syne', sans-serif; font-size: clamp(24px, 5vw, 32px); font-weight: 800; letter-spacing: -0.02em; color: #F2F4FA; margin: 0 0 18px;\">{{ active.name }}<\u002Fh3>\n\n        <image-slot id=\"{{ active.slotId }}\" shape=\"rounded\" radius=\"16\" fit=\"contain\" placeholder=\"{{ active.slotPlaceholder }}\" style=\"width: 100%; height: clamp(220px, 40vw, 340px); display: block; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); margin-bottom: 8px;\"><\u002Fimage-slot>\n        <div style=\"font-size: 12px; color: #565C72; margin-bottom: 20px;\">Tip: drag &amp; drop a screen-recording GIF or screenshot onto the frame above — it saves automatically.<\u002Fdiv>\n\n        <p style=\"margin: 0 0 20px; font-size: 15px; line-height: 1.8; color: #9AA0B4; font-weight: 300;\">{{ active.gist }}<\u002Fp>\n\n        <div style=\"display: grid; gap: 10px; margin-bottom: 24px;\">\n          <sc-for list=\"{{ activeFeatures }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display: flex; align-items: flex-start; gap: 10px; font-size: 14px; line-height: 1.6; color: #C8CBD9;\">\n              <span style=\"color: #C6F24E; flex-shrink: 0;\">✓<\u002Fspan> {{ f }}\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\">\n          <a href=\"{{ active.url }}\" target=\"_blank\" style=\"display: inline-flex; align-items: center; gap: 8px; padding: 13px 26px; border-radius: 999px; background: #C6F24E; color: #07080D; font-size: 14px; font-weight: 700; text-decoration: none;\" style-hover=\"background: #D8FF6B; text-decoration: none;\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.72.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.72-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.35 9.35 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z\"><\u002Fpath><\u002Fsvg>\n            View on GitHub\n          <\u002Fa>\n          <span data-nav-links=\"\" style=\"font-size: 13px; color: #565C72;\">or press Esc to close<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <footer style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.07); padding: 28px clamp(20px, 5vw, 40px); display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; max-width: 1160px; margin: 0 auto;\">\n    <span style=\"font-size: 13px; color: #565C72;\">© 2026 Manoranjan Mangaraj Baral<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showAvatar&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Hero&quot;}, &quot;particleCount&quot;: {&quot;editor&quot;: null, &quot;default&quot;: 55, &quot;tsType&quot;: &quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { typedText: '', activeIdx: null };\n\n  getProjects() {\n    return [\n      { name: 'Rickshaww', lang: 'Kotlin · Android', accent: '#C6F24E', slotId: 'gif-rickshaww', url: 'https://github.com/manoranjan14/Rickshaww',\n        desc: 'Ride-booking Android app with real-time mapping via OSMDroid, live location detection, and Firebase Authentication for drivers and riders.',\n        gist: 'An Uber-style auto-rickshaw booking app. Riders set pickup and drop points on a live map; drivers get authenticated logins and turn-by-turn navigation to the pickup.',\n        features: ['Real-time mapping with OSMDroid — pickup and drop visually connected on the map', 'Current-location detection with drop-point selection', 'Firebase Authentication for separate driver and rider flows'] },\n      { name: 'SNIC', lang: 'PHP · JS', accent: '#8B9AFF', slotId: 'gif-snic', url: 'https://github.com/manoranjan14/SNIC',\n        desc: 'Sneaker e-commerce platform — responsive storefront in HTML/CSS/JS with PHP backend for listings, auth, and order processing.',\n        gist: 'A full e-commerce experience for sneakerheads — browsable storefront for shoppers plus management tools for administrators.',\n        features: ['Responsive storefront built with HTML, CSS, and JavaScript', 'PHP backend for product listings, user authentication, and order processing', 'Admin tooling for efficient catalogue management'] },\n      { name: 'Language Translation App', lang: 'Python', accent: '#FF5EBE', slotId: 'gif-translate', url: 'https://github.com/manoranjan14/Language_translation_Application',\n        desc: 'Desktop Tkinter app translating English to French and Urdu using Transformer models, with local model and tokenizer management.',\n        gist: 'A desktop translator that runs Transformer models locally — type English, get French or Urdu back, no internet required after setup.',\n        features: ['Tkinter GUI designed for simple, fast translation', 'Transformer models for English→French and English→Urdu', 'Local loading/saving of trained models and tokenizers for performance'] },\n      { name: 'My-Gallery', lang: 'Kotlin', accent: '#C6F24E', slotId: 'gif-gallery', url: 'https://github.com/manoranjan14/My-Gallery',\n        desc: 'Privacy-first gallery app that makes organizing, selecting, and editing photos effortless.',\n        gist: 'A modern Android gallery built around privacy — organize, multi-select, and edit photos without your library ever leaving the device.',\n        features: ['Privacy-first: all processing stays on-device', 'Effortless organizing and multi-select workflows', 'Built-in photo editing'] },\n      { name: 'Pet-Adoption-Website', lang: 'PHP', accent: '#8B9AFF', slotId: 'gif-pets', url: 'https://github.com/manoranjan14/Pet-Adoption-Website',\n        desc: 'Web platform connecting pets with new homes — browsing, listings, and adoption workflows.',\n        gist: 'A web platform that connects rescue pets with new homes — browse available animals, view listings, and start an adoption request.',\n        features: ['Browsable pet listings with details', 'Adoption request workflow', 'PHP backend managing listings and submissions'] }\n    ];\n  }\n\n  renderVals() {\n    const projects = this.getProjects();\n    const active = this.state.activeIdx != null ? projects[this.state.activeIdx] : null;\n    return {\n      typedText: this.state.typedText,\n      showAvatar: this.props.showAvatar ?? true,\n      projects,\n      devSkills: ['HTML', 'CSS', 'JavaScript', 'Vue.js', 'Nuxt', 'Angular', 'SCSS', 'Git'],\n      modalOpen: active != null,\n      active: active ? { ...active, slotPlaceholder: 'Drop a demo GIF or screenshot of ' + active.name } : {},\n      activeFeatures: active ? active.features : [],\n      openProject: (e) => {\n        const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);\n        document.body.style.overflow = 'hidden';\n        this.setState({ activeIdx: idx });\n      },\n      closeModal: () => {\n        document.body.style.overflow = '';\n        this.setState({ activeIdx: null });\n      },\n      stopClick: (e) => e.stopPropagation()\n    };\n  }\n\n  componentDidMount() {\n    // --- Esc closes project modal ---\n    this._onKey = (e) => {\n      if (e.key === 'Escape' && this.state.activeIdx != null) {\n        document.body.style.overflow = '';\n        this.setState({ activeIdx: null });\n      }\n    };\n    window.addEventListener('keydown', this._onKey);\n\n    // --- Typing effect ---\n    const phrases = ['responsive web interfaces', 'Vue.js components', 'Angular applications', 'Android experiences', 'user-centric products'];\n    let pi = 0, ci = 0, deleting = false;\n    const tick = () => {\n      const phrase = phrases[pi];\n      if (!deleting) {\n        ci++;\n        if (ci === phrase.length) { deleting = true; this.setState({ typedText: phrase }); this._typeTimer = setTimeout(tick, 2200); return; }\n      } else {\n        ci--;\n        if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; }\n      }\n      this.setState({ typedText: phrase.slice(0, ci) });\n      this._typeTimer = setTimeout(tick, deleting ? 35 : 75);\n    };\n    this._typeTimer = setTimeout(tick, 500);\n\n    // --- Particle network background ---\n    const canvas = document.getElementById('bg-particles');\n    if (canvas) {\n      const ctx = canvas.getContext('2d');\n      let w, h, particles;\n      const resize = () => {\n        w = canvas.width = canvas.offsetWidth;\n        h = canvas.height = canvas.offsetHeight;\n      };\n      resize();\n      this._onResize = resize;\n      window.addEventListener('resize', resize);\n      const N = 55;\n      particles = Array.from({ length: N }, () => ({\n        x: Math.random() * w, y: Math.random() * h,\n        vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35\n      }));\n      const draw = () => {\n        ctx.clearRect(0, 0, w, h);\n        for (const p of particles) {\n          p.x += p.vx; p.y += p.vy;\n          if (p.x < 0 || p.x > w) p.vx *= -1;\n          if (p.y < 0 || p.y > h) p.vy *= -1;\n          ctx.beginPath();\n          ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);\n          ctx.fillStyle = 'rgba(200,203,217,0.5)';\n          ctx.fill();\n        }\n        for (let i = 0; i < particles.length; i++) {\n          for (let j = i + 1; j < particles.length; j++) {\n            const a = particles[i], b = particles[j];\n            const dx = a.x - b.x, dy = a.y - b.y;\n            const d2 = dx * dx + dy * dy;\n            if (d2 < 130 * 130) {\n              ctx.beginPath();\n              ctx.moveTo(a.x, a.y);\n              ctx.lineTo(b.x, b.y);\n              ctx.strokeStyle = 'rgba(198,242,78,' + (0.16 * (1 - d2 / (130 * 130))).toFixed(3) + ')';\n              ctx.lineWidth = 1;\n              ctx.stroke();\n            }\n          }\n        }\n        this._raf = requestAnimationFrame(draw);\n      };\n      this._raf = requestAnimationFrame(draw);\n    }\n\n    // --- Scroll reveals (with fallbacks for iframes where IO never fires) ---\n    const revealEls = Array.from(document.querySelectorAll('[data-reveal]'));\n    revealEls.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(30px)';\n      const delay = el.getAttribute('data-reveal-delay') || '0';\n      el.style.transition = 'opacity 0.8s cubic-bezier(0.4,0,0.2,1) ' + delay + 'ms, transform 0.8s cubic-bezier(0.4,0,0.2,1) ' + delay + 'ms';\n    });\n    const pending = new Set(revealEls);\n    const show = (el) => {\n      el.style.opacity = '1';\n      el.style.transform = 'translateY(0)';\n      pending.delete(el);\n      if (this._observer) this._observer.unobserve(el);\n    };\n    this._observer = new IntersectionObserver(entries => {\n      this._ioFired = true;\n      entries.forEach(e => { if (e.isIntersecting) show(e.target); });\n    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n    revealEls.forEach(el => this._observer.observe(el));\n    const rectCheck = () => {\n      if (this._ioFired) return;\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      Array.from(pending).forEach(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh - 20 && r.bottom > 0) show(el);\n      });\n    };\n    this._revealFallback = () => rectCheck();\n    window.addEventListener('scroll', this._revealFallback, { passive: true });\n    this._fallbackTimer = setTimeout(rectCheck, 600);\n    this._safetyTimer = setTimeout(() => { if (!this._ioFired) Array.from(pending).forEach(show); }, 2500);\n  }\n\n  componentWillUnmount() {\n    if (this._onKey) window.removeEventListener('keydown', this._onKey);\n    clearTimeout(this._typeTimer);\n    clearTimeout(this._fallbackTimer);\n    clearTimeout(this._safetyTimer);\n    cancelAnimationFrame(this._raf);\n    if (this._observer) this._observer.disconnect();\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._revealFallback) window.removeEventListener('scroll', this._revealFallback);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
